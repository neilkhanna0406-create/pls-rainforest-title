<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>*{box-sizing:border-box;margin:0;padding:0;}html,body{width:100%;height:100%;background:#1a3d1a;overflow:hidden;}.scene{width:100%;height:100vh;background:#1a3d1a;overflow:hidden;position:relative;}.leaf{position:absolute;width:22px;height:28px;background:#3a8c2a;border-radius:50% 0 50% 0;animation:sway 4s ease-in-out infinite;transform-origin:bottom center;}.leaf.s{width:14px;height:18px;}.leaf.m{width:18px;height:24px;}.leaf::after{content:"";position:absolute;top:50%;left:50%;width:60%;height:1.5px;background:rgba(255,255,255,0.25);transform:translate(-50%,-50%) rotate(45deg);}.l1{left:3%;top:8%;background:#4aaa35;animation-delay:0s;}.l2{left:7%;top:45%;background:#3a8c2a;animation-delay:0.4s;}.l3{left:12%;top:15%;background:#56c43e;animation-delay:0.9s;}.l4{left:18%;bottom:8%;background:#4aaa35;animation-delay:0.6s;}.l5{right:3%;top:6%;background:#4aaa35;animation-delay:0.2s;border-radius:0 50% 0 50%;}.l6{right:7%;top:50%;background:#3a8c2a;animation-delay:0.7s;border-radius:0 50% 0 50%;}.l7{right:12%;top:12%;background:#56c43e;animation-delay:1.1s;border-radius:0 50% 0 50%;}.l8{right:18%;bottom:10%;background:#4aaa35;animation-delay:1.4s;border-radius:0 50% 0 50%;}.l9{left:5%;bottom:20%;background:#3a8c2a;animation-delay:0.3s;}.l10{right:5%;bottom:25%;background:#56c43e;animation-delay:1s;border-radius:0 50% 0 50%;}.dot{position:absolute;border-radius:50%;background:#7ecf6e;opacity:0;animation:rise 5s ease-in-out infinite;}.d1{width:4px;height:4px;left:30%;animation-delay:0s;}.d2{width:3px;height:3px;left:50%;animation-delay:1.8s;}.d3{width:5px;height:5px;left:68%;animation-delay:3.2s;}.d4{width:3px;height:3px;left:40%;animation-delay:2.5s;}@keyframes rise{0%{opacity:0;bottom:15%;}50%{opacity:0.6;}100%{opacity:0;bottom:80%;}}@keyframes sway{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}.title-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);text-align:center;width:70%;}.eyebrow{font-family:Georgia,serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:rgba(126,207,110,0.8);margin-bottom:10px;animation:up 1s ease both;}.main-title{font-family:Georgia,serif;font-size:44px;font-weight:700;color:#fff;line-height:1.15;animation:up 1s ease 0.15s both;}.main-title span{color:#7ecf6e;}.bar{width:0;height:3px;background:#7ecf6e;border-radius:2px;margin:12px auto 0;animation:grow 1.2s ease 0.3s both;}@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}@keyframes grow{from{width:0;}to{width:72px;}}</style></head><body><div class="scene"><div class="leaf l1"></div><div class="leaf l2 m"></div><div class="leaf l3 m"></div><div class="leaf l4 s"></div><div class="leaf l5"></div><div class="leaf l6 m"></div><div class="leaf l7 m"></div><div class="leaf l8 s"></div><div class="leaf l9 s"></div><div class="leaf l10 s"></div><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div><div class="dot d4"></div><div class="title-wrap"><div class="eyebrow">Biome Project</div><div class="main-title">Journey Through the<br><span>Rainforest</span></div><div class="bar"></div></div></div></body></html>
